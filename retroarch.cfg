# retroarch.cfg — Apple TV 4K (3rd Gen) Drop-In Configuration
# Target:    Apple TV 4K 3rd Gen (2022) · A15 Bionic · 64 GB Wi-Fi (j255ap)
# Software:  RetroArch v1.22.x (App Store) · tvOS 18+
# Source:    README.md (April 2026, rev.13)
# Verified:  All keys against configuration.c / runahead.c · April 2026
# INSTALL:   Upload via web or WebDAV :8080, then quit and relaunch.
#            Do NOT use "Save Current Config" before relaunch.
#            config_save_on_exit is false — save explicitly after intentional changes.
# FORMAT:    key = "value" — booleans are quoted: "true" / "false"
# OMITTED:   video_threaded (crashes #14978), video_hard_sync (no ARB_sync)

# MENU
# XMB crossbar — better for gamepad on TV than Ozone. Restart required.
menu_driver = "xmb"
# Prevents accidental overwrites of tuned config. Save explicitly after changes.
config_save_on_exit = "false"
# Pauses core when menu opens. Reduces thermal load on passively-cooled A15.
menu_pause_libretro = "true"
# Pauses on focus loss (Siri, notifications, app switch). Reduces OS kill risk.
pause_nonactive = "true"
# Disables per-entry metadata lookups. Reduces scroll lag in XMB on large libraries.
playlist_show_sublabels = "false"

# VIDEO
# Metal — best performance on Apple silicon.
video_driver = "metal"
video_vsync = "true"
# Pixel-perfect output; borders expected at 4K.
video_scale_integer = "true"
# OFF so CRT shaders render correctly.
video_smooth = "false"
video_shader_enable = "true"
# Double buffer (default 3 adds ~1 frame latency). Verify: Settings → Video → Sync.
video_max_swapchain_images = "2"
# 22 = Core Provided (v1.9+). Verify: Settings → Video → Scaling → Aspect Ratio.
aspect_ratio_index = "22"
# Explicit swap interval for 60 Hz. Use 2 if TV is set to 120 Hz.
video_swap_interval = "1"
# Suppresses tvOS Aerial screensaver via API. BT input alone may not prevent it.
suspend_screensaver_enable = "true"
# Optional: enable video_scale_integer_overscale for 224p content (NES/SNES).

# AUDIO
# Required for Dynamic Rate Control. Explicit declaration prevents silent breakage.
audio_sync = "true"
# 32 ms globally. Per-core: 48 (NDS/PS1), 64 (N64/Saturn/PSP/3DS). Revert to 48 if crackling.
audio_latency = "32"
# DRC aggressiveness (0.5%). Inaudible; prevents accidental menu changes.
audio_rate_control_delta = "0.005"
# Maximum DRC speed adjustment (5%). Handles ~0.16% core-vs-display rate mismatch.
# PAL content at 50 Hz exceeds this — per-content override needed.
audio_max_timing_skew = "0.050000"
# If audio stutters with >1% refresh deviation, raise rate_control_delta to 0.007–0.008.
# Calibrated display refresh rate for DRC. Run Settings → Video → Output →
# Estimated Screen Refresh Rate (8192+ frames) and accept the measured value.
video_refresh_rate = "59.950001"

# LATENCY
# OFF on fixed 60 Hz display. ON disables DRC and causes judder/audio desync.
# Apple TV QMS-VRR is media-only — not real-time game-frame VRR.
vrr_runloop_enable = "false"
# Preemptive frames (v1.16.0+): lower-cost RunAhead method; run_ahead_frames sets count.
# 1 globally, 0 for Tier 2–3 (N64 keeps 1).
preemptive_frames_enable = "true"
run_ahead_frames = "1"
# Auto frame delay: reclaims unused vsync time. Incompatible with N64/bsnes (#14201).
video_frame_delay_auto = "true"
# Late polling (type 2): reads input at the last moment. Netplay forces Normal (1).
input_poll_type_behavior = "2"

# INPUT
# L3+R3 menu toggle (combo index 2). PS/Xbox home opens tvOS Control Center.
# Other hotkeys must be set via GUI — cfg keys accept keyboard names only.
# Recommended (Select modifier): R1=Save, L1=Load, R2=FF, L2=Rewind,
# D-Right/Left=Slot+/-, Start=Close Content (CRITICAL — only way to exit).
input_menu_toggle_gamepad_combo = "2"
# Solo play: reduces input polling overhead. Set to 2-4 for multiplayer.
input_max_users = "1"

# DIRECTORIES
# Store under Config/ (iCloud-synced). ":" = tvOS app content root.
rgui_browser_directory = ":/Config/ROMs"
system_directory = ":/Config/BIOS"
savefile_directory = ":/Config/saves"
savestate_directory = ":/Config/states"

# CLOUD SYNC
# CloudKit backend. Syncs saves/states/core settings. NOT: retroarch.cfg, ROMs, playlists.
cloud_sync_enable = "true"
cloud_sync_backend = "icloud"
# Exclude thumbnails (large, replaceable) and system/BIOS (managed separately).
cloud_sync_enable_thumbnails = "false"
cloud_sync_enable_system = "false"

# SAVE MANAGEMENT
# Sort by core name for cross-device sync. Content-dir sorting breaks sync.
sort_savefiles_enable = "true"
sort_savestates_enable = "true"
sort_savefiles_by_content_enable = "false"
sort_savestates_by_content_enable = "false"
# Track per-game play time.
content_runtime_log = "true"
# Flush SRAM every 30s. Without this, tvOS cache eviction loses unsaved progress.
autosave_interval = "30"
# Auto-save state on content close; auto-load on reopen. Safety net for tvOS eviction.
savestate_auto_save = "true"
savestate_auto_load = "true"
# Reduces state sizes; less eviction pressure on 64 GB, faster iCloud sync.
savestate_file_compression = "true"
# Visual save state slot previews (v1.21.0+). Improves couch-distance readability.
savestate_thumbnail_enable = "true"

# REWIND
# Disabled globally. Enable per-game only where rewind-as-gameplay is desired.
# Preemptive frames provides latency benefit; rewind adds a second serialization
# pass per frame. N64 freezes with rewind.
rewind_enable = "false"

# REFERENCE (no active keys below — see README.md for full documentation)

# Per-Core Override Reference
# Path: Config/config/<core_name>/<core_name>.cfg
# GUI:  Quick Menu -> Overrides -> Save Core Overrides
# Tier 1 — run-ahead safe
#   Mesen (NES)          run_ahead="1"
#     Core options:      mesen_nospritelimit=On  mesen_overclock=Medium
#                        mesen_overclock_type="Before NMI"  mesen_reduce_dmc_popping=On
#   Snes9x (SNES)        run_ahead="1" (2 for SMW/Zelda)
#     Core options:      snes9x_reduce_sprite_flicker=enabled  snes9x_overclock_cycles=Light
#     Per-game:          snes9x_overclock=200 for SuperFX titles (Star Fox, Yoshi's Island,
#                        Doom, Stunt Race FX). Test per title for timing bugs.
#   mGBA (GBA)           run_ahead="1"
#     Core options:      mgba_color_correction="Game Boy Advance"
#                        mgba_interframe_blending=Smart  mgba_audio_low_pass_filter=ON
#   Genesis Plus GX      run_ahead="1"
#     Core options:      genesis_plus_gx_ym2612="Nuked (YM2612)"
#                        genesis_plus_gx_audio_filter=Low-Pass  genesis_plus_gx_lowpass_range=55
#                        genesis_plus_gx_no_sprite_limit=enabled
#                        genesis_plus_gx_bram="per game"
#   Beetle PCE           run_ahead="1"
#     Core options:      pce_fast_cdimagecache=enabled  pce_fast_nospritelimit=enabled
#   FinalBurn Neo        rewind="false" run_ahead="1"
#     Note: rewind conflicts with runahead in FBNeo (#16374)
# Tier 2 — limited latency reduction
#   PCSX ReARMed (PS1)   run_ahead="0"  rewind="false"  preemptive="false"
#                        video_threaded="true"  audio="48"
#     Note: Without JIT, run-ahead doubles interpreter workload. Re-enable per-game for 2D.
#     Core options:      pcsx_rearmed_drc=disabled  pcsx_rearmed_duping_enable=enabled
#                        pcsx_rearmed_frameskip=Auto  pcsx_rearmed_frameskip_threshold=33
#                        pcsx_rearmed_gpu_thread_rendering=Synchronous  pcsx_rearmed_psxclock=57
#   Mupen64Plus-Next     run_ahead="1"  audio="64"  rewind="false"
#     (N64)              frame_delay_auto="false" (#14201)  video_threaded="true"
#     Core options:      mupen64plus-cpucore=cached_interpreter  mupen64plus-rsp-plugin=HLE
#                        mupen64plus-rdp-plugin=GLideN64  mupen64plus-43screensize=320x240
#                        mupen64plus-ThreadedRenderer=True
#                        mupen64plus-EnableCopyColorToRDRAM=Async
#                        mupen64plus-EnableCopyColorFromRDRAM=Off
#                        mupen64plus-EnableCopyDepthToRDRAM=Software
#                        mupen64plus-txFilterMode=None
#   melonDS DS (NDS)     run_ahead="0"  rewind="false"  preemptive="false"
#                        frame_delay_auto="false"  video_threaded="true"  audio="48"
#     Core options:      melonds_threaded_renderer=enabled
#                        melonds_ds_jit_enable=disabled  melonds_ds_boot_directly=enabled
# Tier 3 — disable all latency features
#   Beetle Saturn        preemptive="false" run_ahead="0" rewind="false" shader="false"
#                        frame_delay_auto="false"  video_threaded="true"  audio="64"
#     Core options:      beetle_saturn_cdimagecache=enabled  beetle_saturn_midsync=disabled
#     Note: Only viable Saturn core on tvOS (Yabause/Kronos requires OGL 4.3)
#   PPSSPP (PSP)         driver="gl" (#18050) preemptive="false" run_ahead="0" rewind="false"
#                        shader="false"  frame_delay_auto="false"
#                        video_threaded="true"  audio="64"
#     Core options:      ppsspp_vertex_cache=enabled  ppsspp_separate_io_thread=enabled
#                        ppsspp_internal_resolution=1x  ppsspp_fast_memory=disabled
#                        ppsspp_texture_scaling_level=1
#                        ppsspp_frameskip=1  ppsspp_auto_frameskip=enabled
#                        ppsspp_gpu_hardware_transform=enabled  ppsspp_software_skinning=enabled
#                        ppsspp_ignore_bad_memory_access=enabled
#                        ppsspp_cache_full_iso_in_ram=enabled  ppsspp_psp_model=psp_2000_3000
#     Note: fast_memory is crash-prone without JIT — re-enable per-game with testing.
#     Note: Metal->GL driver switch is unstable (#4804). Test Metal in current builds;
#           retain GL if crash persists. Alternatives: --config or standalone PPSSPP app.
#   Azahar (3DS)         preemptive="false" run_ahead="0" rewind="false" shader="false"
#                        frame_delay_auto="false"  video_threaded="true"  audio="64"
#     Core options:      citra_use_hw_renderer=enabled  citra_use_hw_shaders=enabled
#                        citra_use_hw_shader_cache=enabled  citra_resolution_factor=1
#                        citra_texture_filter=none
#                        azahar_use_cpu_jit=disabled  azahar_use_shader_jit=disabled
#                        azahar_is_new_3ds="New 3DS"
#     Note: Core option keys may use azahar_ prefix instead of citra_. Verify on device.

# Post-Install Checklist
# Install:   App Store -> Online Updater -> Upload cfg + relaunch
# Input:     BT controller -> L3+R3 menu toggle -> Hotkeys via GUI -> Close Content
# Content:   ROMs in Config/ROMs/ -> BIOS in Config/BIOS/ -> Manual Scan
# Display:   4K SDR 60Hz -> HDR OFF -> Game Mode -> 4:4:4 -> Core Provided
# Audio:     tvOS Audio Format: Stereo -> Reduce Loud Sounds: OFF
# Sync:      vrr_runloop OFF -> video_refresh_rate calibrated -> audio_sync ON
# Latency:   Auto Frame Delay -> Late Poll -> Swapchain 2 (verify Metal)
# Saves:     autosave_interval 30 -> savestate auto-save/load -> compression ON
# Config:    config_save_on_exit OFF -> menu_pause_libretro ON
# Shaders:   CRT per-core -> iCloud Sync -> Relaunch for initial sync
# Overrides: N64: no auto delay + no rewind + cached_interpreter + GLideN64 + threaded
#            PS1: no preemptive + DRC disabled + duping + threaded
#            NDS: no preemptive + no auto delay + JIT disabled + threaded
#            PSP: GL + no latency features + fast_memory disabled + threaded
#            Saturn: Beetle Saturn (not Yabause) + CD cache + no midsync + threaded
#            3DS: CPU/shader JIT disabled + New 3DS + threaded
