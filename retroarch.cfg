# retroarch.cfg v3.22 · Apple TV 4K 3rd Gen (tvOS 26 · RetroArch v1.22.x · Metal/coreaudio/mfi) · 73 keys · paired with retroarch-configs v3.22 · upload to / (web root); do NOT "Save Current Config" before relaunch (§2)

# === Menu / UI ===
menu_driver = "xmb"
menu_enable_widgets = "true"
menu_pause_libretro = "true"
menu_show_sublabels = "false"
menu_horizontal_animation = "false"
menu_show_load_content_animation = "false"
menu_xmb_animation_horizontal_highlight = "0"
menu_xmb_animation_move_up_down = "2"
menu_xmb_animation_opening_main_menu = "0"
menu_shader_pipeline = "0"
xmb_menu_color_theme = "20"
xmb_shadows_enable = "false"
config_save_on_exit = "false"
pause_nonactive = "false"
playlist_compression = "true"
content_favorites_size = "10"
content_history_size = "10"
core_info_cache_enable = "true"

# === Video (display, shaders, sync, crop) ===
video_driver = "metal"
video_scale_integer = "true"
aspect_ratio_index = "22"
video_smooth = "false"
video_shader_enable = "true"
video_vsync = "true"
video_gpu_screenshot = "true"
video_frame_delay_auto = "true"
video_threaded = "false"
video_refresh_rate = "60.000000"
fps_show = "true"
video_hdr_enable = "false"
video_hdr_max_nits = "1000"
suspend_screensaver_enable = "true"

# === Audio ===
audio_driver = "coreaudio"
audio_sync = "true"
audio_out_rate = "48000"
audio_resampler_quality = "2"
audio_latency = "48"

# === Latency / Run Ahead / Input poll ===
vrr_runloop_enable = "false"
preemptive_frames_enable = "false"
run_ahead_enabled = "false"
run_ahead_frames = "2"
run_ahead_secondary_instance = "false"
run_ahead_hide_warnings = "true"
fastforward_ratio = "4.0"

# === Input (controllers, hotkeys) ===
input_menu_toggle_gamepad_combo = "2"
input_joypad_driver = "mfi"
input_auto_game_focus = "1"
input_overlay_enable = "false"

# === Saves / Savestates ===
savestate_file_compression = "true"
save_file_compression = "true"
sort_savefiles_enable = "true"
sort_savestates_enable = "true"
autosave_interval = "300"
block_sram_overwrite = "true"
savestate_auto_index = "true"
savestate_auto_save = "true"
savestate_thumbnail_enable = "false"
savestate_max_keep = "10"
rewind_enable = "false"

# === Security (privacy-functional pins + restored network cmd-surface drift-guards) ===
network_cmd_enable = "false"
network_remote_enable = "false"
network_on_demand_thumbnails = "false"
cloud_sync_enable = "false"

# === Null drivers (tvOS-inert subsystems; skip init) ===
bluetooth_driver = "null"
wifi_driver = "null"
midi_driver = "null"
record_driver = "null"
camera_driver = "null"
location_driver = "null"

# === Netplay (active hardening + restored MITM-relay drift-guard) ===
netplay_public_announce = "false"
netplay_nat_traversal = "false"
netplay_use_mitm_server = "false"

# === Logging ===
log_verbosity = "false"
