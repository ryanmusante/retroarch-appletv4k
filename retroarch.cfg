# retroarch cfg apple tv 4k 3rd gen drop-in configuration target menu xmb crossbar better gamepad tv ozone restart required
menu_driver = "xmb"
# prevents accidental overwrites tuned config save explicitly after changes
config_save_on_exit = "false"
# pauses core when menu opens reduce thermal load passively-cooled a15
menu_pause_libretro = "true"
# pauses focus loss siri notifications app switch reduce os kill
pause_nonactive = "true"
# per-entry metadata lookups reduce scroll lag in xmb large libraries
playlist_show_sublabels = "false"
# compress playlists 90 reduce cache writes volatile tvos storage
playlist_compression = "true"
# caps xmb 3d ribbon 60 fps without menu runs uncapped
menu_throttle_framerate = "true"
# menu left thumbnails omitted default menu left thumbnails default 0
content_favorites_size = "10"
content_history_size = "10"
# VIDEO; Removes garbage border pixels from retro cores. Core-dependent
video_crop_overscan = "true"
# Metal — best performance on Apple silicon
video_driver = "metal"
# Pixel-perfect output; borders expected at 4K
video_scale_integer = "true"
aspect_ratio_index = "22"
# OFF so CRT shaders render correctly
video_smooth = "false"
video_shader_enable = "true"
# global default crt easymode tier 1 cores tier 2 override zfast_crt per-core
video_shader = "shaders_slang/crt/crt-easymode.slangp"
# triple buffer baseline for pacing stability on fixed-refresh tvOS
video_max_swapchain_images = "3"
# explicit swap interval 60 hz use 2 if tv set
video_swap_interval = "1"
# suppresses tvos aerial screensaver via api bt input alone may
suspend_screensaver_enable = "true"
# per-core overscale video scale integer scaling 1 mesen/snes9x/genesis plus gx
video_gpu_screenshot = "true"
# metal argument buffers v1 22 1+ reduce cpu draw-call overhead
video_use_metal_arg_buffers = "true"
# frame delay manages explicit 0 documents intent nonzero acts ceiling
video_frame_delay = "0"
# crashes tvos metal 14978 explicit false prevents accidental toggle per-core
video_threaded = "false"
# audio dynamic rate control video refresh rate grouped here because
audio_sync = "true"
# 48 khz matches apple tv hdmi audio output natively prevents
audio_out_rate = "48000"
# normal 3 kaiser resampler a15 has headroom tier 1 per-core
audio_resampler_quality = "2"
# conservative baseline audio buffer; lower only after per-core validation
audio_latency = "64"
# drc 0 5 pitch adjustment drc corrects sub-percent refresh drift
audio_rate_control_delta = "0.005"
# apple tv hdmi 59 94 hz calibrate settings video output
video_refresh_rate = "59.940060"
# latency off fixed 60 hz drc judder/desync apple tv qms-vrr
vrr_runloop_enable = "false"
# preemptive frames v1 15 0+ lower-cost runahead since pr 17093
preemptive_frames_enable = "false"
run_ahead_frames = "1"
# suppress runahead warning osd per-core overrides already incompatible cores
run_ahead_hide_warnings = "true"
# conservative baseline; enable per-core only after confirming stable pacing
video_frame_delay_auto = "false"
# late polling type 2 reads input last moment netplay forces
input_poll_type_behavior = "2"
# baseline disables global runahead; keep frame count preset for optional per-core use
run_ahead_enabled = "false"
# single-instance runahead ~half cpu of second-instance tier 1 cores safe a15 thermal
run_ahead_secondary_instance = "false"
# cap 5 default 0 uncapped a15 thermal throttle ff may
fastforward_ratio = "3.0"
# input l3+r3 menu toggle combo 2 ps/xbox home opens tvos
input_menu_toggle_gamepad_combo = "2"
# solo play reduce input polling overhead set 2-4 multiplayer
input_max_users = "1"
# apple gccontroller framework only viable driver tvos explicit prevents drift
input_joypad_driver = "mfi"
system_directory = "config/BIOS"
rgui_browser_directory = "config/ROMs"
# cloud sync settings fully no backend sync targets
cloud_sync_enable = "false"
cloud_sync_driver = ""
# Thumbnails and system/BIOS sync also disabled
cloud_sync_sync_saves = "false"
cloud_sync_sync_configs = "false"
cloud_sync_sync_thumbs = "false"
cloud_sync_sync_system = "false"
# save management compress save states 90 n64 17 mb 1
savestate_file_compression = "true"
# compress sram srm files reduce local cache footprint key save
save_file_compression = "true"
# flush sram every 30s without tvos cache eviction loses unsaved
autosave_interval = "30"
# auto-save state content close auto-load reopen safety net tvos eviction
savestate_auto_save = "true"
savestate_auto_load = "true"
# prevents save state loads overwriting newer in-game sram saves srm
block_sram_overwrite = "true"
# required savestate max keep function default false without hotkey saves
savestate_auto_index = "true"
# Visual save state slot previews. Improves couch-distance readability
savestate_thumbnail_enable = "true"
# cap auto-increment states per game bounds cache consumption 64 gb
savestate_max_keep = "10"
# rewind globally preemptive frames covers latency rewind adds serialization overhead
rewind_enable = "false"
# security critical v1 22 1 zero-auth command interface udp 55355
network_cmd_enable = "false"
# network retropad unauthenticated input injection over udp 55400 55420
network_remote_enable = "false"
# Same command set as network_cmd via stdin
stdin_cmd_enable = "false"
# block core hardware access tvos sandbox already restricts but explicit
camera_allow = "false"
location_allow = "false"
# on-demand thumbnails hang game/state load when server slow 17242
network_on_demand_thumbnails = "false"
# upstream defaults true announces session to libretro netplay server network traffic
netplay_public_announce = "false"
# defaults false upstream kept explicit for audit discord rpc background ipc
discord_allow = "false"
# upstream defaults true animated toast notifications extra gpu compositing
menu_enable_widgets = "false"
# upstream defaults true non-winrt pacing wait frame-latency overhead tvos metal
video_waitable_swapchains = "false"
# logging explicit false os log malloc/vsnprintf/free per message preemptive frames
log_verbosity = "false"
# file logging wastes volatile cache space earlier eviction saves/states
log_to_file = "false"
# per-core overrides see readme md 10 gui quick menu overrides
