# retroarch.cfg - Apple TV 4K 3rd gen drop-in; XMB menu (restart required)
menu_driver = "xmb"
# prevent accidental overwrites; save explicitly after changes
config_save_on_exit = "false"
# pause on menu; thermal relief for passive A15
menu_pause_libretro = "true"
# pause on focus loss; Siri/notifications/app-switch; reduce OS kill
pause_nonactive = "true"
# metadata lookups per entry; XMB scroll lag on large libs
playlist_show_sublabels = "false"
# ~90% playlist compression; cache-write relief on tvOS
playlist_compression = "true"
content_favorites_size = "10"
content_history_size = "10"
# VIDEO: integer overscale per-core (Mesen/Snes9x/GPGX/Beetle PCE/mGBA/FBN)
# crop overscan (core-dependent)
video_crop_overscan = "true"
# Metal driver; best on Apple silicon
video_driver = "metal"
# pixel-perfect; borders at 4K
video_scale_integer = "true"
# index 22 = ASPECT_RATIO_CORE (Core Provided) per gfx/video_defines.h
aspect_ratio_index = "22"
# smoothing off; required for CRT shaders
video_smooth = "false"
video_shader_enable = "true"
# global default crt-easymode; Tier 2 override zfast_crt per-core
video_shader = "shaders_slang/crt/crt-easymode.slangp"
# double buffer; lower latency vs triple on fixed-refresh tvOS
video_max_swapchain_images = "2"
# 60Hz swap; set 2 for 30fps on 60Hz panels
video_swap_interval = "1"
# best-effort screensaver suspend; tvOS ignores while paused - screensaver may still fire
suspend_screensaver_enable = "true"
# GPU-side screenshot capture (no CPU readback)
video_gpu_screenshot = "true"
# Metal argument buffers (RA 1.22.1+); CPU draw-call relief
video_use_metal_arg_buffers = "true"
# explicit 0; nonzero = ceiling
video_frame_delay = "0"
# Apple-platform threaded-video force-disable (#14978); per-core cfgs also keep false
video_threaded = "false"
# AUDIO: audio_sync paired with video_refresh_rate for pacing
audio_sync = "true"
# 48kHz native tvOS HDMI out; no resample
audio_out_rate = "48000"
# Kaiser resampler 2 baseline; lower than upstream 3 for A15 headroom
audio_resampler_quality = "2"
# 48ms; lower than prior 64ms baseline; raise per-core if crackling
audio_latency = "48"
# DRC 0.008 (up from upstream 0.005); headroom for uncalibrated tvOS drift
audio_rate_control_delta = "0.008"
# tvOS 59.94Hz NTSC; calibrate via Settings -> Video -> Output
video_refresh_rate = "59.940060"
# LATENCY: off for fixed 60Hz; VRR is QMS-only on tvOS
vrr_runloop_enable = "false"
# preemptive frames (RA 1.15+, PR #14832; menu unified in PR #17093)
preemptive_frames_enable = "false"
run_ahead_frames = "1"
# suppress run-ahead OSD warnings (per-core overrides handle incompat)
run_ahead_hide_warnings = "true"
# auto frame delay on; per-core guard keeps Mupen64Plus-Next false (#14201)
video_frame_delay_auto = "true"
# late polling (2); input read last moment; netplay forces
input_poll_type_behavior = "2"
# global run-ahead off; frame count preset for per-core use
run_ahead_enabled = "false"
# single-instance run-ahead; ~1/2 CPU of second-instance; A15 thermal-safe
run_ahead_secondary_instance = "false"
# ff ratio 3x (was 5x); A15 thermal headroom
fastforward_ratio = "3.0"
# INPUT: L3+R3 menu toggle; home button opens tvOS
input_menu_toggle_gamepad_combo = "2"
# solo play; raise to 2-4 for multiplayer
input_max_users = "1"
# MFi (GCController); only viable tvOS driver
input_joypad_driver = "mfi"
system_directory = "config/BIOS"
rgui_browser_directory = "config/ROMs"
savefile_directory = "config/saves"
savestate_directory = "config/states"
# CLOUD SYNC: disabled; no backend targets
cloud_sync_enable = "false"
cloud_sync_driver = ""
# thumbnails + system/BIOS sync also off
cloud_sync_sync_saves = "false"
cloud_sync_sync_configs = "false"
cloud_sync_sync_thumbs = "false"
cloud_sync_sync_system = "false"
# SAVES: compress states ~90% (N64 17MB -> ~1MB)
savestate_file_compression = "true"
# compress sram srm files; reduce local cache footprint
save_file_compression = "true"
# flush sram every 60s (was 30s); reduce tvOS volatile cache churn
autosave_interval = "60"
# prevents save state loads overwriting newer in-game sram saves
block_sram_overwrite = "true"
# required for savestate_max_keep function
savestate_auto_index = "true"
# Visual save state slot previews. Improves couch-distance readability
savestate_thumbnail_enable = "true"
# cap auto-increment states per game; 5 (was 10) bounds 64GB cache consumption
savestate_max_keep = "5"
# rewind off; preemptive covers latency, rewind adds serialization cost
rewind_enable = "false"
# security: RA 1.22.1 zero-auth command interface udp 55355
network_cmd_enable = "false"
# network retropad unauthenticated input injection over udp 55400-55420
network_remote_enable = "false"
# Same command set as network_cmd via stdin
stdin_cmd_enable = "false"
# block core hardware access; tvos sandbox already restricts but explicit
camera_allow = "false"
location_allow = "false"
# on-demand thumbnails hang game/state load when server slow (#17242)
network_on_demand_thumbnails = "false"
# upstream default true; announces to libretro netplay server
netplay_public_announce = "false"
# defaults false upstream; kept explicit for audit (discord rpc background ipc)
discord_allow = "false"
# upstream default true; animated toast notifications (extra gpu compositing)
menu_enable_widgets = "false"
# upstream default true; non-winrt pacing wait frame-latency overhead on Apple Metal (tvOS)
video_waitable_swapchains = "false"
# log off; os_log malloc/vsnprintf/free per message
log_verbosity = "false"
# file logging wastes volatile cache space (earlier eviction of saves/states)
log_to_file = "false"
# per-core overrides - see README for manual install path
