# retroarch.cfg — Apple TV 4K 3rd Gen global baseline (v3.2)
# tvOS 26 · RetroArch v1.22.x · Metal / coreaudio · mfi (GCController)
# 65 keys · paired with retroarch-configs v3.2 for Tier 1/2 per-core overrides
# Upload to / (web root); per §2 do NOT "Save Current Config" before relaunch.

# === Menu / UI ===
menu_driver = "xmb"
config_save_on_exit = "false"
menu_pause_libretro = "true"
pause_nonactive = "true"
playlist_show_sublabels = "false"
playlist_compression = "true"
content_favorites_size = "10"
content_history_size = "10"
menu_enable_widgets = "false"

# === Video (display, shaders, sync, crop) ===
video_driver = "metal"
video_crop_overscan = "true"
video_scale_integer = "true"
aspect_ratio_index = "22"
video_smooth = "false"
video_shader_enable = "true"
video_max_swapchain_images = "2"
video_swap_interval = "1"
video_vsync = "true"
video_gpu_screenshot = "true"
video_frame_delay = "0"
video_threaded = "false"
video_refresh_rate = "59.940060"
video_waitable_swapchains = "false"
suspend_screensaver_enable = "true"

# === Audio ===
audio_driver = "coreaudio"
audio_sync = "true"
audio_out_rate = "48000"
audio_resampler_quality = "1"
audio_latency = "64"

# === Latency / Run Ahead / Input poll ===
vrr_runloop_enable = "false"
preemptive_frames_enable = "false"
run_ahead_enabled = "false"
run_ahead_frames = "2"
run_ahead_secondary_instance = "false"
run_ahead_hide_warnings = "true"
video_frame_delay_auto = "true"
input_poll_type_behavior = "2"
fastforward_ratio = "0.0"

# === Input (controllers, hotkeys) ===
input_menu_toggle_gamepad_combo = "2"
input_joypad_driver = "mfi"
input_overlay_enable = "false"

# === Saves / Savestates ===
savestate_file_compression = "true"
save_file_compression = "true"
sort_savefiles_enable = "true"
sort_savestates_enable = "true"
autosave_interval = "150"
block_sram_overwrite = "true"
savestate_auto_index = "true"
savestate_auto_save = "true"
savestate_auto_load = "false"
savestate_thumbnail_enable = "false"
savestate_max_keep = "10"
rewind_enable = "false"

# === Security (command surfaces, privacy, cloud, on-demand net) ===
stdin_cmd_enable = "false"
camera_allow = "false"
location_allow = "false"
network_on_demand_thumbnails = "false"
cloud_sync_enable = "false"

# === Netplay (disable public announce, NAT-PMP/UPnP, MITM relay, spectator) ===
netplay_public_announce = "false"
netplay_nat_traversal = "false"
netplay_use_mitm_server = "false"
netplay_start_as_spectator = "false"
discord_allow = "false"

# === Logging ===
log_verbosity = "false"
log_to_file = "false"
