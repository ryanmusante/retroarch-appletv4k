###############################################################################
#
#  retroarch.cfg — Apple TV 4K (3rd Gen) Drop-In Configuration
#
#  Target:    Apple TV 4K 3rd Gen (2022) · A15 Bionic · 64 GB Wi-Fi (j255ap)
#  Software:  RetroArch v1.22.x (App Store) · tvOS 18+
#  Source:    README.md (March 2026, rev.6)
#  Verified:  All keys verified against RetroArch source (configuration.c,
#             runahead.c). See README.md for full documentation.
#
#  INSTALLATION
#    1. Open RetroArch on Apple TV → note the IP from the Welcome popup
#    2. On a computer, browse to http://<apple-tv-ip> or WebDAV :8080
#    3. Upload this file to:  RetroArch/retroarch.cfg
#    4. Quit RetroArch (double-tap TV button, swipe up) and relaunch
#
#    WARNING: Do NOT use "Save Current Config" before relaunching —
#    it overwrites the uploaded file with the old in-memory config.
#
#  FORMAT
#    key = "value"     Booleans are quoted strings: "true" / "false"
#
#  INTENTIONALLY OMITTED
#    video_threaded       Crashes on tvOS with Metal (#14978)
#    video_hard_sync      Requires ARB_sync (unavailable on Metal/GLES)
#
###############################################################################


# =============================================================================
#  §1  MENU
# =============================================================================
# XMB: console-style crossbar, better for gamepad on TV. Restart required.

menu_driver = "xmb"


# =============================================================================
#  §2  VIDEO
# =============================================================================
# Metal is the best-performing driver on Apple silicon.
# Integer scaling gives pixel-perfect output (borders are expected at 4K).
# Bilinear filtering OFF so CRT shaders render correctly.

video_driver = "metal"
video_vsync = "true"
video_scale_integer = "true"
video_smooth = "false"
video_shader_enable = "true"

# Reduce GPU presentation queue to 2 (double buffer). Default 3 adds ~1 frame
# of pipeline latency. Officially supported on Vulkan/DRM; community-confirmed
# on Metal (macOS). Harmless if unsupported — silently ignored by driver.
# VERIFY: Settings → Video → Synchronization → Max Swapchain Images.

video_max_swapchain_images = "2"

# Index 22 = Core Provided (v1.9+, confirmed March 2026).
# VERIFY: Settings → Video → Scaling → Aspect Ratio should show "Core Provided".

aspect_ratio_index = "22"


# =============================================================================
#  §3  AUDIO
# =============================================================================
# Safe range: 48–64 ms. Lower = less latency but risk crackling.
# Per-core overrides can lower to 32 (Tier 1) or raise to 64 (N64).

audio_latency = "48"


# =============================================================================
#  §4  LATENCY
# =============================================================================
# Three complementary techniques, all active by default:
#
#   Preemptive frames   Modern alternative to RunAhead. Set to 1 globally;
#                       bump to 2 per-core for PS1. Disable for Tier 3 cores.
#                       Requires video_threaded OFF (omitted above).
#
#   Auto frame delay    Delays rendering start within each vsync period,
#                       polling input at the last moment. Stacks with above.
#                       Known issue: incompatible with Mupen64Plus-Next and
#                       bsnes (#14201) — disable per-core.
#
#   Late input polling  Reads controller input at the last possible moment.
#                       Type 2 = Late. Netplay forces Normal (1) regardless.

preemptive_frames_enable = "true"
run_ahead_frames = "1"
video_frame_delay_auto = "true"
input_poll_type_behavior = "2"


# =============================================================================
#  §5  INPUT
# =============================================================================
# PS/Xbox home button opens tvOS Control Center, not RetroArch menu.
# Combo index 2 = L3 + R3 (click both thumbsticks).
#
# All other hotkeys must be set via GUI (Settings → Input → Hotkeys) because
# cfg keys accept keyboard names only, and button indices vary by controller.
#
# Recommended GUI bindings (with Select as Enable Hotkeys modifier):
#   Save State       Select + R1       State Slot +   Select + D-Pad Right
#   Load State       Select + L1       State Slot −   Select + D-Pad Left
#   Fast Forward     Select + R2 (hold)   Close Content  Select + Start
#   Rewind           Select + L2 (hold)
#
# WARNING: Without Close Content configured, there is no way to exit a game
# without force-quitting the app.

input_menu_toggle_gamepad_combo = "2"


# =============================================================================
#  §6  DIRECTORIES
# =============================================================================
# tvOS guarantees only 500 KB persistent storage. Everything else is purgeable
# cache. Store all content under Config/ which syncs to iCloud via CloudKit.
# The ":" prefix is RetroArch's notation for the tvOS app content root.

rgui_browser_directory = ":/Config/ROMs"
system_directory = ":/Config/BIOS"
savefile_directory = ":/Config/saves"
savestate_directory = ":/Config/states"


# =============================================================================
#  §7  CLOUD SYNC
# =============================================================================
# CloudKit backend ("icloud"). iCloud Drive backend (PR #17814) is NOT
# available on Apple TV. Syncs: saves, states, config. Does NOT sync:
# retroarch.cfg, ROMs, playlists. Enable on every device with same Apple ID.

cloud_sync_enable = "true"
cloud_sync_backend = "icloud"


# =============================================================================
#  §8  SAVE MANAGEMENT
# =============================================================================
# Sort by core name for consistent cross-device sync. Do NOT sort by content
# directory — breaks sync when ROM paths differ between devices.

sort_savefiles_enable = "true"
sort_savestates_enable = "true"
sort_savefiles_by_content_enable = "false"
sort_savestates_by_content_enable = "false"


# =============================================================================
#  §9  REWIND
# =============================================================================
# Disabled globally — CPU-intensive. Enable per-core for Tier 1 only
# (NES, SNES, Genesis, GB/GBC/GBA, PCE, Arcade).
# WARNING: Do NOT enable for N64 (freezes, #18300), Saturn, or PSP.

rewind_enable = "false"


###############################################################################
#
#  REFERENCE (no active keys below — see README.md for full documentation)
#
###############################################################################


# =============================================================================
#  APPENDIX A — Per-Core Override Reference
# =============================================================================
# Override path: Config/config/<core_name>/<core_name>.cfg
# Create via GUI: Quick Menu → Overrides → Save Core Overrides
#
# TIER 1 — Flawless (rewind + run-ahead safe)
#
#   Mesen (NES)          rewind_enable = "true"
#                        run_ahead_frames = "1"
#
#   Snes9x (SNES)        rewind_enable = "true"
#                        run_ahead_frames = "1"  (2 for SMW/Zelda if clean)
#
#   mGBA (GBA)           rewind_enable = "true"
#                        run_ahead_frames = "1"
#                        audio_latency = "32"
#
#   Genesis Plus GX      rewind_enable = "true"
#                        run_ahead_frames = "1"
#
#   Beetle PCE           rewind_enable = "true"
#                        run_ahead_frames = "1"
#
#   FinalBurn Neo        rewind_enable = "true"
#                        run_ahead_frames = "1"
#
# TIER 2 — Good (limited latency reduction)
#
#   PCSX ReARMed (PS1)   run_ahead_frames = "2"
#                        audio_latency = "48"
#                        rewind_enable = "false"
#
#   Mupen64Plus-Next     run_ahead_frames = "1"
#   (N64)                rewind_enable = "false"           (#18300 freeze)
#                        video_frame_delay_auto = "false"  (#14201)
#                        audio_latency = "64"
#
#   melonDS DS (NDS)     run_ahead_frames = "1"
#                        rewind_enable = "false"
#
# TIER 3 — Limited (disable all latency features)
#
#   Yabause (Saturn)     preemptive_frames_enable = "false"
#                        run_ahead_frames = "0"
#                        rewind_enable = "false"
#                        video_shader_enable = "false"
#
#   PPSSPP (PSP)         video_driver = "gl"               (#18050 crash)
#                        preemptive_frames_enable = "false"
#                        run_ahead_frames = "0"
#                        rewind_enable = "false"
#                        video_shader_enable = "false"
#
#   Azahar (3DS)         preemptive_frames_enable = "false"
#                        run_ahead_frames = "0"
#                        rewind_enable = "false"
#                        video_shader_enable = "false"


# =============================================================================
#  APPENDIX B — Post-Install Checklist
# =============================================================================
# Install and configure
#   ☐  RetroArch installed from tvOS App Store
#   ☐  Online Updater run: Assets, Core Info, Databases, Slang Shaders
#   ☐  This config uploaded and loaded on relaunch (do NOT Save Current Config)
#
# Controllers and input
#   ☐  Bluetooth controller paired (DualSense or Xbox Series recommended)
#   ☐  Menu Toggle verified (L3 + R3 opens Quick Menu in-game)
#   ☐  Hotkeys configured via GUI (Settings → Input → Hotkeys)
#   ☐  Close Content hotkey set (Select + Start)
#
# Content
#   ☐  ROMs in Config/ROMs/<s>/
#   ☐  BIOS files in Config/BIOS/ (case-sensitive filenames)
#   ☐  Manual Scan completed per system
#
# Display and performance
#   ☐  Apple TV output: 4K SDR 60 Hz
#   ☐  Match Dynamic Range: OFF
#   ☐  TV Game Mode enabled
#   ☐  Chroma 4:4:4 / RGB Full on TV
#   ☐  aspect_ratio_index verified as "Core Provided" in GUI
#   ☐  Automatic Frame Delay enabled
#   ☐  Input Poll Type Behavior: Late
#   ☐  Max Swapchain Images: 2 (verify on Metal)
#
# Shaders and sync
#   ☐  CRT shader applied per-core (Quick Menu → Shaders → Save Core Preset)
#   ☐  iCloud Cloud Sync enabled
#   ☐  Quit and relaunch to trigger initial iCloud sync
#
# Per-core overrides
#   ☐  N64: disable auto frame delay + rewind
#   ☐  PSP: switch to GL, disable latency features
