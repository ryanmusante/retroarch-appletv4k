# retroarch.cfg — Apple TV 4K (3rd Gen) Drop-In Configuration; Target: Apple TV 4K 3rd Gen (2022) · A15 Bionic · 64 GB Wi-Fi (j255ap); Software: RetroArch v1.22.x (App Store) · tvOS 26; Source: README.md (April 2026); Verified: All keys against configuration.c / runahead.c · April 2026; INSTALL: Upload via web or WebDAV :8080, then quit and relaunch. Do NOT use "Save Current Config" before relaunch. config_save_on_exit is false — save explicitly after intentional changes. File Browser and System/BIOS directories are set manually in the UI; see README.md for the authoritative layout and path guidance. FORMAT: key = "value" — booleans are quoted: "true" / "false"; OMITTED: video_hard_sync (no ARB_sync on Metal) recording_enable (not a real setting; recording is a runtime hotkey only — verified absent in configuration.c v1.22.x); CONFLICT: video_shader_enable + video_scale_integer — set integer="false" per-core where multi-pass CRT shaders (crt-geom, crt-hyllian) control geometry. DEFAULTS: Keys matching tvOS factory defaults are retained only when the comment documents Apple TV behavior, a known bug, or security hardening. Purely redundant keys are omitted.

# MENU; XMB crossbar — better for gamepad on TV than Ozone. Restart required.
menu_driver = "xmb"
# Prevents accidental overwrites of tuned config. Save explicitly after changes.
config_save_on_exit = "false"
# Pauses core when menu opens. Reduces thermal load on passively-cooled A15.
menu_pause_libretro = "true"
# Pauses on focus loss (Siri, notifications, app switch). Reduces OS kill risk.
pause_nonactive = "true"
# Disables per-entry metadata lookups. Reduces scroll lag in XMB on large libraries.
playlist_show_sublabels = "false"
# Compress playlists ~90%. Reduces cache writes on volatile tvOS storage.
playlist_compression = "true"
# Caps XMB 3D ribbon at 60 fps. Without this, menu runs uncapped → wasted GPU + heat.
menu_throttle_framerate = "true"
# menu_left_thumbnails omitted — DEFAULT_MENU_LEFT_THUMBNAILS_DEFAULT = 0 (config.def.h:1664). Secondary thumbnail is already off out of the box. Reduce playlist memory. Defaults are 200 each; lower for 4 GB RAM.
content_favorites_size = "10"
content_history_size = "10"

# VIDEO; Removes garbage border pixels from retro cores. Core-dependent.
video_crop_overscan = "true"
# Metal — best performance on Apple silicon.
video_driver = "metal"
# Pixel-perfect output; borders expected at 4K.
video_scale_integer = "true"
# OFF so CRT shaders render correctly.
video_smooth = "false"
video_shader_enable = "true"
# Double buffer (default 3 adds ~1 frame latency). Use 3 on 120 Hz panels. Verify: Settings → Video → Sync.
video_max_swapchain_images = "2"
# Explicit swap interval for 60 Hz. Use 2 if TV is set to 120 Hz.
video_swap_interval = "1"
# Suppresses tvOS Aerial screensaver via API. BT input alone may not prevent it.
suspend_screensaver_enable = "true"
# Per-core overscale (video_scale_integer_scaling = "1") on Mesen/Snes9x/Genesis Plus GX (224p), Beetle PCE Fast (240p), and mGBA (GBA 240×160). Post-shader screenshot. Required for accurate captures when shaders enabled.
video_gpu_screenshot = "true"
# Metal argument buffers (v1.22.1+). Reduces CPU draw-call overhead. Revert if glitches.
video_use_metal_arg_buffers = "true"
# Auto frame delay manages this. Explicit 0 documents intent; nonzero acts as ceiling.
video_frame_delay = "0"
# Crashes on tvOS with Metal (#14978). Explicit false prevents accidental toggle. Per-core true for interpreter-bound cores (N64, PS1) via retroarch-configs overrides.
video_threaded = "false"

# AUDIO & DYNAMIC RATE CONTROL video_refresh_rate is grouped here because DRC depends on it. Required for Dynamic Rate Control. Explicit declaration prevents silent breakage.
audio_sync = "true"
# 48 kHz matches Apple TV HDMI audio output natively. Prevents unnecessary resampling.
audio_out_rate = "48000"
# Normal (3) = Kaiser resampler. A15 has headroom for Tier 1. Per-core Lower (2) for Tier 2. Values: 0=Don't Care, 1=Lowest, 2=Lower, 3=Normal, 4=Higher, 5=Highest.
audio_resampler_quality = "3"
# 32 ms globally. Per-core: 48 (PS1), 64 (N64). Revert to 48 if crackling.
audio_latency = "32"
# DRC: 0.5% pitch adjustment. DRC corrects sub-percent refresh drift only (e.g., a display measured as 59.94 vs 59.91). It does NOT reconcile PAL; 50 Hz content on a 60 Hz display — that requires swap_interval tuning or an actual 50 Hz/100 Hz display mode. Raise to 0.007-0.008 only if a calibration measurement shows >1% refresh deviation.
audio_rate_control_delta = "0.005"
# Apple TV HDMI = 59.94 Hz. Calibrate: Settings → Video → Output → Estimated Refresh Rate.
video_refresh_rate = "59.940060"

# LATENCY; OFF on fixed 60 Hz. ON disables DRC → judder/desync. Apple TV QMS-VRR is media-only.
vrr_runloop_enable = "false"
# Preemptive frames (v1.15.0+): lower-cost runahead. Since PR #17093, preemptive frames is a runahead "mode" — preemptive_frames_enable and run_ahead_enabled are mutually exclusive. run_ahead_frames is the count for whichever mode is active. Effective layering: global = 1-frame preemptive. Tier 1 per-core overrides raise run_ahead_frames to 2 (still preemptive). Tier 2 per-core overrides set run_ahead_frames=0 AND preemptive_frames_enable=false to disable entirely.
preemptive_frames_enable = "true"
run_ahead_frames = "1"
# Suppress runahead warning OSD. Per-core overrides already disable for incompatible cores.
run_ahead_hide_warnings = "true"
# Auto frame delay: reclaims unused vsync time. Incompatible with N64/bsnes (#14201).
video_frame_delay_auto = "true"
# Late polling (type 2): reads input at the last moment. Netplay forces Normal (1).
input_poll_type_behavior = "2"
# Explicit false. preemptive_frames_enable handles latency; this disables legacy runahead.
run_ahead_enabled = "false"
# Cap at 5×. Default 0 = uncapped → A15 thermal throttle. FF may not work with Metal.
fastforward_ratio = "5.0"

# INPUT; L3+R3 menu toggle (combo 2). PS/Xbox home opens tvOS Control Center. Hotkeys via GUI only. Select modifier: R1=Save, L1=Load, Start=Close Content.
input_menu_toggle_gamepad_combo = "2"
# Solo play: reduces input polling overhead. Set to 2-4 for multiplayer.
input_max_users = "1"
# Apple GCController framework. Only viable driver on tvOS; explicit prevents drift.
input_joypad_driver = "mfi"


# Cloud sync settings (fully disabled; no backend or sync targets enabled).
cloud_sync_enable = "false"
cloud_sync_driver = ""
# Thumbnails and system/BIOS sync also disabled.
cloud_sync_sync_saves = "false"
cloud_sync_sync_configs = "false"
cloud_sync_sync_thumbs = "false"
cloud_sync_sync_system = "false"

# SAVE MANAGEMENT; Compress save states ~90% (N64: 17 MB → 1.5 MB). Reduces local storage and cache pressure.
savestate_file_compression = "true"
# Compress SRAM .srm files. Reduces local cache footprint. Key is save_file_compression (configuration.c:1842) — NOT savefile_file_compression. The older name was silently ignored, so SRAM was NOT being compressed prior to v2.34.
save_file_compression = "true"
# Flush SRAM every 30s. Without this, tvOS cache eviction loses unsaved progress.
autosave_interval = "30"
# Auto-save state on content close; auto-load on reopen. Safety net for tvOS eviction.
savestate_auto_save = "true"
savestate_auto_load = "true"
# Prevents save state loads from overwriting newer in-game SRAM saves (.srm).
block_sram_overwrite = "true"
# Required for savestate_max_keep to function. Default is false — without this, manual hotkey saves always overwrite the current slot and max_keep is a no-op.
savestate_auto_index = "true"
# Visual save state slot previews. Improves couch-distance readability.
savestate_thumbnail_enable = "true"
# Cap auto-increment states per game. Bounds cache consumption on 64 GB model.
savestate_max_keep = "10"

# REWIND; Disabled globally. Preemptive frames covers latency; rewind adds serialization overhead.
rewind_enable = "false"

# SECURITY; CRITICAL: v1.22.1 enabled zero-auth command interface on UDP 55355. Must disable.
network_cmd_enable = "false"
# Network retropad: unauthenticated input injection over UDP 55400–55420.
network_remote_enable = "false"
# Same command set as network_cmd via stdin.
stdin_cmd_enable = "false"
# Block core hardware access. tvOS sandbox already restricts, but explicit is defensive.
camera_allow = "false"
location_allow = "false"
# On-demand thumbnails hang on game/state load when server is slow (#17242).
network_on_demand_thumbnails = "false"

# LOGGING; Explicit false. os_log malloc/vsnprintf/free per message; preemptive frames re-executes.
log_verbosity = "false"
# File logging wastes volatile cache space → earlier eviction of saves/states.
log_to_file = "false"

# PER-CORE OVERRIDES — see README.md §10; GUI: Quick Menu → Overrides → Save Core Overrides
