# retroarch.cfg — Apple TV 4K (3rd Gen) Drop-In Configuration
# Target:    Apple TV 4K 3rd Gen (2022) · A15 Bionic · 64 GB Wi-Fi (j255ap)
# Software:  RetroArch v1.22.x (App Store) · tvOS 18+
# Source:    README.md (April 2026, rev.18)
# Verified:  All keys against configuration.c / runahead.c · April 2026
# INSTALL:   Upload via web or WebDAV :8080, then quit and relaunch.
#            Do NOT use "Save Current Config" before relaunch.
#            config_save_on_exit is false — save explicitly after intentional changes.
# FORMAT:    key = "value" — booleans are quoted: "true" / "false"
# OMITTED:   video_hard_sync (no ARB_sync on Metal)
# CONFLICT:  video_shader_enable + video_scale_integer — set integer="false" per-core
#            where multi-pass CRT shaders (crt-geom, crt-hyllian) control geometry.

# MENU
# XMB crossbar — better for gamepad on TV than Ozone. Restart required.
menu_driver = "xmb"
# Prevents accidental overwrites of tuned config. Save explicitly after changes.
config_save_on_exit = "false"
# Pauses core when menu opens. Reduces thermal load on passively-cooled A15.
menu_pause_libretro = "true"
# Pauses on focus loss (Siri, notifications, app switch). Reduces OS kill risk.
pause_nonactive = "true"
# Disables per-entry metadata lookups. Reduces scroll lag in XMB on large libraries.
playlist_show_sublabels = "false"
# Caps XMB 3D ribbon at 60 fps. Without this, menu runs uncapped → wasted GPU + heat.
menu_throttle_framerate = "true"
# Disables secondary thumbnail in XMB. Halves thumbnail memory on 4 GB device.
menu_left_thumbnails = "0"
# Reduce playlist memory. Defaults are 200 each; lower for 4 GB RAM.
content_favorites_size = "100"
content_history_size = "50"

# VIDEO
# Metal — best performance on Apple silicon.
video_driver = "metal"
video_vsync = "true"
# Pixel-perfect output; borders expected at 4K.
video_scale_integer = "true"
# OFF so CRT shaders render correctly.
video_smooth = "false"
video_shader_enable = "true"
# Double buffer (default 3 adds ~1 frame latency). Verify: Settings → Video → Sync.
video_max_swapchain_images = "2"
# 22 = Core Provided (v1.9+). Verify: Settings → Video → Scaling → Aspect Ratio.
aspect_ratio_index = "22"
# Explicit swap interval for 60 Hz. Use 2 if TV is set to 120 Hz.
video_swap_interval = "1"
# Suppresses tvOS Aerial screensaver via API. BT input alone may not prevent it.
suspend_screensaver_enable = "true"
# Per-core: video_scale_integer_scaling = "1" (overscale) for 224p content (NES/SNES).
# Post-shader screenshot. Required for accurate captures when shaders enabled.
video_gpu_screenshot = "true"
# Crops garbage overscan pixels at screen edges. Core-dependent.
video_crop_overscan = "true"
# Metal argument buffers (v1.22.1+). Reduces CPU draw-call overhead. Revert if glitches.
video_use_metal_arg_buffers = "true"
# Auto frame delay manages this. Explicit 0 documents intent; nonzero acts as ceiling.
video_frame_delay = "0"
# Crashes on tvOS (#14978). Explicit false prevents accidental menu toggle.
# Tier 2–3 per-core overrides set "true" where needed.
video_threaded = "false"

# AUDIO
# Required for Dynamic Rate Control. Explicit declaration prevents silent breakage.
audio_sync = "true"
# 48 kHz matches Apple TV HDMI audio output natively. Prevents unnecessary resampling.
audio_output_rate = "48000"
# Normal (3) = Kaiser resampler. A15 has headroom for Tier 1. Per-core Lower (2) for Tier 2–3.
# Values: 0=Don't Care, 1=Lowest, 2=Lower, 3=Normal, 4=Higher, 5=Highest.
audio_resampler_quality = "3"
# 32 ms globally. Per-core: 48 (NDS/PS1), 64 (N64/Saturn/PSP/3DS). Revert to 48 if crackling.
audio_latency = "32"
# DRC: 0.5% pitch adjustment. Raise to 0.007–0.008 if >1% refresh deviation.
audio_rate_control_delta = "0.005"
# Max 5% speed adjustment. PAL 50 Hz exceeds this — per-content override needed.
audio_max_timing_skew = "0.050000"
# Apple TV HDMI = 59.94 Hz. Calibrate: Settings → Video → Output → Estimated Refresh Rate.
video_refresh_rate = "59.940060"

# LATENCY
# OFF on fixed 60 Hz. ON disables DRC → judder/desync. Apple TV QMS-VRR is media-only.
vrr_runloop_enable = "false"
# Preemptive frames (v1.15.0+): lower-cost runahead; 1 globally, 0 for Tier 2–3.
preemptive_frames_enable = "true"
run_ahead_frames = "1"
# Auto frame delay: reclaims unused vsync time. Incompatible with N64/bsnes (#14201).
video_frame_delay_auto = "true"
# Late polling (type 2): reads input at the last moment. Netplay forces Normal (1).
input_poll_type_behavior = "2"
# Explicit false. preemptive_frames_enable handles latency; this disables legacy runahead.
run_ahead_enabled = "false"
# Cap at 5×. Default 0 = uncapped → A15 thermal throttle. FF may not work with Metal.
fastforward_ratio = "5.0"

# INPUT
# L3+R3 menu toggle (combo 2). PS/Xbox home opens tvOS Control Center.
# Hotkeys via GUI only. Select modifier: R1=Save, L1=Load, Start=Close Content.
input_menu_toggle_gamepad_combo = "2"
# Solo play: reduces input polling overhead. Set to 2-4 for multiplayer.
input_max_users = "1"
# Apple GCController framework. Only viable driver on tvOS; explicit prevents drift.
input_joypad_driver = "mfi"
# Full haptic feedback for DualSense/Xbox via Core Haptics (tvOS 14+).
input_rumble_gain = "100"

# DIRECTORIES
# Store under Config/ (iCloud-synced). ":" = tvOS app content root.
rgui_browser_directory = ":/Config/ROMs"
system_directory = ":/Config/BIOS"
savefile_directory = ":/Config/saves"
savestate_directory = ":/Config/states"

# CLOUD SYNC
# CloudKit backend. Syncs saves/states/core settings. NOT: retroarch.cfg, ROMs, playlists.
cloud_sync_enable = "true"
cloud_sync_backend = "icloud"
# Exclude thumbnails (large, replaceable) and system/BIOS (managed separately).
cloud_sync_enable_thumbnails = "false"
cloud_sync_enable_system = "false"

# SAVE MANAGEMENT
# Sort by core name for cross-device sync. Content-dir sorting breaks sync.
sort_savefiles_enable = "true"
sort_savestates_enable = "true"
sort_savefiles_by_content_enable = "false"
sort_savestates_by_content_enable = "false"
# Track per-game play time.
content_runtime_log = "true"
# Flush SRAM every 30s. Without this, tvOS cache eviction loses unsaved progress.
autosave_interval = "30"
# Auto-save state on content close; auto-load on reopen. Safety net for tvOS eviction.
savestate_auto_save = "true"
savestate_auto_load = "true"
# Reduces state sizes; less eviction pressure on 64 GB, faster iCloud sync.
savestate_file_compression = "true"
# Visual save state slot previews. Improves couch-distance readability.
savestate_thumbnail_enable = "true"
# Cap auto-increment states per game. Bounds cache consumption on 64 GB model.
savestate_max_keep = "10"

# REWIND
# Disabled globally. Preemptive frames covers latency; rewind adds serialization overhead.
rewind_enable = "false"

# SECURITY
# CRITICAL: v1.22.1 enabled zero-auth command interface on UDP 55355. Must disable.
network_cmd_enable = "false"
# Network retropad: unauthenticated input injection over UDP 55400–55420.
network_remote_enable = "false"
# Same command set as network_cmd via stdin.
stdin_cmd_enable = "false"
# Block core hardware access. tvOS sandbox already restricts, but explicit is defensive.
camera_allow = "false"
location_allow = "false"
# On-demand thumbnails hang on game/state load when server is slow (#17242).
network_on_demand_thumbnails = "false"

# LOGGING
# Explicit false. os_log malloc/vsnprintf/free per message; preemptive frames re-executes.
log_verbosity = "false"
# File logging wastes volatile cache space → earlier eviction of saves/states.
log_to_file = "false"
# OSD overlays add per-frame render overhead. Prevent accidental activation.
fps_show = "false"
statistics_show = "false"
# Metal recording support incomplete (TODO in driver). Significant overhead.
recording_enable = "false"

# PER-CORE OVERRIDES — see README.md §10
# Path: Config/config/<core_name>/<core_name>.cfg
# GUI:  Quick Menu → Overrides → Save Core Overrides
