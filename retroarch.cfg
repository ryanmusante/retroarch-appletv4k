###############################################################################
#
#  retroarch.cfg — Apple TV 4K (3rd Gen) Drop-In Configuration
#
#  Target:    Apple TV 4K 3rd Gen (2022) · A15 Bionic · 128 GB
#  Software:  RetroArch v1.22.x (App Store) · tvOS 18+
#  Source:    retroarch-apple-tv-setup-guide.pdf (March 2026, rev.2)
#  Verified:  RetroArch source (configuration.c, runahead.c),
#             Libretro docs, GitHub issues, Arch Wiki
#  Updated:   March 2026 — audit against online sources
#             Added Section 16: 4th Gen (2026) hardware notes
#
#  INSTALLATION
#    1. Open RetroArch on Apple TV → note the IP from the Welcome popup
#    2. On a computer, browse to http://<apple-tv-ip> or WebDAV :8080
#    3. Upload this file to:  RetroArch/retroarch.cfg
#    4. Quit RetroArch (double-tap TV button, swipe up) and relaunch
#       RetroArch loads retroarch.cfg from disk on startup.
#       WARNING: Do NOT use "Save Current Config" before relaunching —
#       it overwrites the uploaded file with the old in-memory config.
#
#  KEY NAMING CONVENTION
#    All keys below are verified against RetroArch source configuration.c.
#    Keys use the format:  key = "value"
#    Booleans are quoted strings: "true" / "false"
#
###############################################################################


# =============================================================================
#  1. MENU
# =============================================================================
# Ozone is the tvOS default. XMB provides a console-style crossbar
# (PlayStation XrossMediaBar) better suited for gamepad navigation on TV.
# Requires restart to take effect.
#
# Source: Libretro iOS/tvOS docs — Apple TV defaults to Ozone
# Verified: menu_driver key in configuration.c

menu_driver = "xmb"


# =============================================================================
#  2. VIDEO
# =============================================================================
# Metal is the recommended and best-performing video driver on Apple silicon.
# Bilinear filtering (video_smooth) is OFF so shaders render correctly.
# Integer scaling provides pixel-perfect output without fractional artifacts.
# NOTE: At 4K (3840×2160), integer scaling of low-res content produces
# significant borders — e.g. SNES 256×224 fills ~56% of the screen.
# This is by design for pixel accuracy. Disable for full-screen stretch.
#
# RetroArch v1.20.0 added pixel-perfect integer scaling improvements
# including per-axis options and a "smart" mode. Consider per-core
# overrides using aspect_ratio_index = "23" (Custom) for PS1 titles
# that change internal resolution mid-game.
#
# IMPORTANT: video_threaded is intentionally OMITTED. On tvOS with Metal,
# threaded video crashes RetroArch (GitHub #14978) and is incompatible with
# preemptive frames (Section 4), which requires deterministic frame timing.
# Metal on A15 Bionic provides sufficient performance without threading.
#
# Hard GPU Sync (video_hard_sync) is intentionally OMITTED. It relies on
# OpenGL's ARB_sync extension, unavailable on Metal or OpenGL ES.
# video_max_swapchain_images = "2" (below) is the closest equivalent
# for Metal/Vulkan, though Metal driver support is not guaranteed by
# Libretro docs — verify in Settings → Video → Synchronization.
#
# Source: Libretro iOS/tvOS docs, AppleInsider guide (Feb 2026)
# Verified: video_driver, video_vsync, video_scale_integer,
#           video_smooth, video_shader_enable — all in configuration.c

video_driver = "metal"
video_vsync = "true"
video_scale_integer = "true"
video_smooth = "false"
video_shader_enable = "true"

# Reduce the GPU presentation queue to 2 images (minimum for double
# buffering). The default of 3 adds ~one frame of pipeline latency.
# Officially supported on Vulkan and DRM/KMS. Community-confirmed
# working on Metal on macOS (M1/M2 Macs), but Libretro docs note
# "video drivers might not implement setting lower max swapchains."
# Setting is harmless if unsupported (silently ignored by the driver).
#
# VERIFY: After loading this config, check Settings → Video →
# Synchronization → Max Swapchain Images to confirm value applied.
# If the option is greyed out or absent, Metal on tvOS does not
# support it and this key can be removed.
#
# Source: RetroArch latency docs, Libretro optimal-vsync guide,
#         community testing (mameonmacs.blogspot.com)
# Verified: video_max_swapchain_images in configuration.c
# Risk: May have no effect on Metal driver — verify in GUI

video_max_swapchain_images = "2"

# Aspect ratio — "Core Provided" lets each emulation core set its native ratio.
# Index 22 = Core Provided in current RetroArch (v1.9+, confirmed March 2026).
# Historically index 21 was Core Provided (e.g. circa 2016-2019); a later
# addition shifted it to 22. ALWAYS verify in the GUI after loading this config.
# VERIFY: Settings → Video → Scaling → Aspect Ratio should show "Core Provided".
# If wrong, correct it via the GUI and re-save configuration.
#
# Source: GitHub #12387 (confirmed 22 = Core Provided), EmuDeck #1331
# Risk: Index may shift in future versions

aspect_ratio_index = "22"


# =============================================================================
#  3. AUDIO
# =============================================================================
# Safe range is 48–64 ms. Lower values reduce latency but risk crackling.
# Start at 48; increase to 64 if you hear audio artifacts.
#
# Source: Guide Section 13
# Verified: audio_latency in configuration.c

audio_latency = "48"


# =============================================================================
#  4. LATENCY — Preemptive Frames
# =============================================================================
# Preemptive Frames is the modern, lower-overhead alternative to RunAhead.
# Both features share the run_ahead_frames setting (only one can be active).
#
# REQUIRES: video_threaded must be OFF (or omitted). Threaded video breaks
# the deterministic frame timing that preemptive frames depends on.
#
# Set to 1 for lightweight cores (NES, SNES, Genesis, GBA).
# Use per-core overrides to bump to 2 for PS1/N64.
# Set to 0 (or disable) for Saturn/PSP where CPU headroom is tight.
#
# Source: RetroArch PR #14832 (neil4), runahead.c
# Verified: preemptive_frames_enable (bool), run_ahead_frames (uint)

preemptive_frames_enable = "true"
run_ahead_frames = "1"


# =============================================================================
#  4b. LATENCY — Automatic Frame Delay
# =============================================================================
# Automatically delays the start of frame rendering within each ~16.7ms
# vsync period, polling input at the last possible moment. If a frame
# renders in 8ms, the remaining ~8ms of latency is reclaimed.
# Stacks with preemptive frames for maximum input-lag reduction.
#
# NOTE: Known issue (#14201) — auto frame delay may not function
# correctly with Mupen64Plus-Next and bsnes. Use per-core overrides
# to disable for those cores if issues arise.
#
# Source: RetroArch v1.9.13 changelog, v1.20.0 refactor
# Verified: video_frame_delay_auto in configuration.c

video_frame_delay_auto = "true"


# =============================================================================
#  4c. LATENCY — Late Input Polling
# =============================================================================
# Controls when RetroArch reads controller input each frame:
#   0 = Early (before core runs)
#   1 = Normal (default, at standard point)
#   2 = Late  (last possible moment before core processes)
#
# Late polling reduces perceived input lag, especially valuable on
# Apple TV where Bluetooth controller latency is already a factor.
# NOTE: Netplay forces Normal (1) regardless of this setting.
#
# Source: Libretro input lag reduction docs, RetroPie #3134
# Verified: input_poll_type_behavior in configuration.c

input_poll_type_behavior = "2"


# =============================================================================
#  5. HOTKEYS
# =============================================================================
# On Apple TV, the PS/Xbox home button opens tvOS Control Center — NOT the
# RetroArch Quick Menu. A controller combo must be configured instead.
#
# input_menu_toggle_gamepad_combo uses a predefined combo index:
#   0 = None
#   1 = L + R + Y + D-Pad Down
#   2 = L3 + R3 (click both thumbsticks) ← RECOMMENDED (overrides tvOS default of 1)
#   3 = L + R + Start + Select
#   4 = Start + Select
#   5 = L3 + R1
#   6 = L1 + R1
#   7 = Hold Start (2 sec)
#   8 = Hold Select (2 sec)
#   9 = Down + Select
#  10 = L2 + R2
#
# Source: GitHub issue #12928, Libretro Quick Menu docs
# Verified: input_menu_toggle_gamepad_combo in configuration.c

input_menu_toggle_gamepad_combo = "2"

# ─── ADDITIONAL HOTKEYS (GUI-ONLY ON APPLE TV) ───
#
# All other hotkeys MUST be configured through the GUI because:
#   - cfg keys like input_save_state accept keyboard key names only
#   - Gamepad equivalents (input_*_btn) use numeric button indices that
#     vary by controller model and autoconfig profile
#   - Apple TV has no keyboard
#
# Configure at:  Settings → Input → Hotkeys
#
# Recommended bindings (set via GUI):
#   Enable Hotkeys modifier : Select / Share
#   Save State              : Select + R1
#   Load State              : Select + L1
#   Fast Forward (hold)     : Select + R2
#   Rewind (hold)           : Select + L2
#   State Slot +            : Select + D-Pad Right
#   State Slot –            : Select + D-Pad Left
#   Close Content           : Select + Start


# =============================================================================
#  6. DIRECTORIES — iCloud-Persistent Storage
# =============================================================================
# CRITICAL: tvOS guarantees only 500 KB persistent storage per app. All other
# files (ROMs, saves, BIOS, shaders, thumbnails) are purgeable cache that
# tvOS can silently delete at any time.
#
# SOLUTION: Store everything under Config/, which syncs to iCloud via CloudKit.
# Files in Downloads/ WILL be purged without warning.
#
# The ":" prefix is RetroArch's notation for the app content root.
# These paths resolve inside the tvOS app sandbox container.
#
# If these paths don't resolve, set them via GUI:
#   Settings → Directory → File Browser  → Config/ROMs/
#   Settings → Directory → System/BIOS   → Config/BIOS/
#   Settings → Directory → Savefile      → Config/saves/
#   Settings → Directory → Savestate     → Config/states/
#
# Source: Guide Section 8, How-To Geek (Jul 2025), iMore (May 2024)
# Verified: rgui_browser_directory, system_directory, savefile_directory,
#           savestate_directory in configuration.c
# NOTE: rgui_browser_directory sets the file browser root for ALL menu
# drivers (XMB, Ozone, RGUI) despite the "rgui" prefix (legacy naming).

rgui_browser_directory = ":/Config/ROMs"
system_directory = ":/Config/BIOS"
savefile_directory = ":/Config/saves"
savestate_directory = ":/Config/states"


# =============================================================================
#  7. CLOUD SYNC — iCloud
# =============================================================================
# RetroArch on tvOS uses CloudKit DB for iCloud sync (not iCloud Drive).
# Synced data: save files (.srm), save states, configuration files.
# NOT synced: retroarch.cfg itself, playlists, .DS_Store files.
#
# Enable on EVERY Apple device with the SAME Apple ID. Ensure the
# "Sort Saves into Folders by Core Name" setting matches across all devices.
#
# If sync fails, reconfigure via GUI:
#   Settings → Saving → Cloud Sync → Enable Cloud Sync → ON
#   Settings → Saving → Cloud Sync → Backend → iCloud
#
# Source: Libretro Cloud Sync docs, GitHub issues #17454, #16847
# Verified: cloud_sync_enable, cloud_sync_backend in configuration.c
# NOTE: "icloud" = CloudKit backend. "icloud_drive" is a separate backend
# added later (PR #17814) but is NOT available on Apple TV.

cloud_sync_enable = "true"
cloud_sync_backend = "icloud"


# =============================================================================
#  8. SAVE MANAGEMENT
# =============================================================================
# Sort saves into core-name subdirs for consistent cross-device sync.
# Do NOT sort by content directory — this breaks sync when ROM paths differ.
#
# Source: Libretro Cloud Sync docs
# Verified: sort_savefiles_enable, sort_savestates_enable,
#           sort_savefiles_by_content_enable, sort_savestates_by_content_enable

sort_savefiles_enable = "true"
sort_savestates_enable = "true"
sort_savefiles_by_content_enable = "false"
sort_savestates_by_content_enable = "false"


# =============================================================================
#  9. REWIND
# =============================================================================
# Disabled globally — CPU-intensive. Enable per-core via overrides where
# the A15 has headroom (NES, SNES, Genesis, GB, GBC, GBA only).
#
# WARNING: Do NOT enable rewind for Mupen64Plus-Next — GitHub #18300
# reports freezing. Do NOT enable for Saturn or PSP.
#
# Source: Guide Section 13, GitHub #18300
# Verified: rewind_enable in configuration.c

rewind_enable = "false"


###############################################################################
#
#  REFERENCE SECTIONS (documentation only — no active config keys below)
#
###############################################################################


# =============================================================================
# 10. CRT SHADERS — Per-Core Setup Guide
# =============================================================================
# Apple TV uses Metal, which supports Slang (.slangp) shader presets.
# Presets are located under:  shaders_slang/crt/
#
# HOW TO APPLY:
#   1. Launch a game
#   2. Open Quick Menu (L3 + R3)
#   3. Shaders → Video Shaders → ON
#   4. Load Preset → shaders_slang → crt → select preset
#   5. Save Preset → Save Core Preset (applies to all games on that core)
#
# TROUBLESHOOTING: RetroArch v1.19.1 added automatic re-extraction of
# assets when tvOS deletes cached data. If shaders_slang/crt/ appears
# empty, first try: Online Updater → Update Slang Shaders.
# If that fails (partially resolved GitHub #16083), manually upload
# shader presets via the web interface or WebDAV to:
#   Config/shaders_slang/crt/
#
# ┌────────────────────────────┬──────────────────────────┬──────────────────┐
# │ Shader Preset              │ Best For                 │ GPU Load         │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ zfast_crt.slangp           │ All systems, esp. PS1    │ Minimal          │
# │                            │ N64, Saturn              │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-easymode.slangp        │ NES, SNES, Genesis, GBA  │ Low              │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-hyllian.slangp         │ SNES, Genesis            │ Low              │
# │                            │ (Trinitron look)         │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-geom.slangp            │ All 2D systems           │ Low–Moderate     │
# │                            │ (scanlines + curvature)  │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-lottes-fast.slangp     │ 16-bit systems           │ Moderate         │
# │                            │ (slot mask + bloom)      │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-pi.slangp              │ Heaviest cores (fallback)│ Minimal          │
# │                            │ Even lighter than zfast  │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-potato-warm.slangp     │ All systems              │ Minimal          │
# │ crt-potato-cool.slangp     │ (lookup-texture based)   │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ fakelottes.slangp          │ 16-bit systems           │ Low              │
# │                            │ (lighter crt-lottes)     │                  │
# ├────────────────────────────┼──────────────────────────┼──────────────────┤
# │ crt-aperture.slangp        │ SNES, Genesis            │ Low              │
# │                            │ (Trinitron, lighter than │                  │
# │                            │  crt-hyllian)            │                  │
# └────────────────────────────┴──────────────────────────┴──────────────────┘
#
# RECOMMENDED PER-CORE SHADER ASSIGNMENTS:
#   Mesen (NES)            → crt-easymode.slangp
#   Snes9x (SNES)          → crt-hyllian.slangp
#   mGBA (GBA)             → crt-easymode.slangp
#   Genesis Plus GX (MD)   → crt-hyllian.slangp
#   Beetle PCE (TG-16)     → crt-easymode.slangp
#   FinalBurn Neo (Arcade)  → crt-easymode.slangp
#   PCSX ReARMed (PS1)     → zfast_crt.slangp
#   Mupen64Plus-Next (N64) → zfast_crt.slangp  (or no shader)
#   Yabause (Saturn)       → crt-pi.slangp  (if any shader at all)
#   PPSSPP (PSP)           → no shader
#   Azahar (3DS)           → no shader
#
# DO NOT USE (too GPU-intensive, will cause frame drops on A15):
#   crt-royale, crt-geom-deluxe, guest-dr-venom, guest-advanced,
#   any Mega Bezel preset
#
# Source: Guide Section 11, Libretro CRT shader docs, Emulation General Wiki


# =============================================================================
# 11. BIOS FILES — Placement Reference
# =============================================================================
# Upload to Config/BIOS/ via web interface or WebDAV.
# File names are CASE-SENSITIVE — verify exact names match core expectations.
# Check per-core requirements:  Settings → Core → Manage Cores → <core>
#
# ┌──────────────────────┬─────────────────────────────────┬──────────────────┐
# │ System               │ Required Files                  │ Status           │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ PlayStation 1        │ scph5501.bin  (NA)              │ Required         │
# │                      │ scph1001.bin  (alt NA)          │                  │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ Sega CD / Mega CD    │ bios_CD_U.bin (NA)              │ Required         │
# │                      │ bios_CD_E.bin (EU)              │                  │
# │                      │ bios_CD_J.bin (JP)              │                  │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ Sega Saturn          │ sega_101.bin                    │ Required         │
# │                      │ mpr-17933.bin                   │                  │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ TurboGrafx-CD        │ syscard3.pce                    │ Required         │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ Neo Geo              │ neogeo.zip                      │ Required         │
# │                      │ (also in Config/ROMs/neogeo/)   │                  │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ Nintendo DS          │ bios7.bin                       │ Required         │
# │                      │ bios9.bin                       │                  │
# │                      │ firmware.bin                    │                  │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ Game Boy Advance     │ gba_bios.bin                    │ Optional         │
# ├──────────────────────┼─────────────────────────────────┼──────────────────┤
# │ NES / SNES / Genesis │ None                            │ Built-in         │
# │ Game Boy / GBC       │                                 │                  │
# └──────────────────────┴─────────────────────────────────┴──────────────────┘
#
# Source: Guide Section 6, Libretro per-core BIOS docs


# =============================================================================
# 12. RECOMMENDED CORES
# =============================================================================
# Tier 1 — Flawless (full speed, CRT shaders OK):
#   NES              → Mesen
#   SNES             → Snes9x
#   GB / GBC / GBA   → mGBA
#   Genesis / MD / CD → Genesis Plus GX
#   PC Engine / TG-16 → Beetle PCE
#   Neo Geo / Arcade  → FinalBurn Neo
#
# Tier 2 — Good (most titles full speed):
#   PlayStation 1     → PCSX ReARMed  (faster on ARM than Beetle PSX)
#   Nintendo 64       → Mupen64Plus-Next  (keep resolution 1×–2×)
#   Nintendo DS       → melonDS DS  (no touchscreen on Apple TV)
#
# Tier 3 — Limited (compatibility issues):
#   Sega Saturn       → Yabause  (disable rewind, no shaders)
#
# Tier 3 — Limited/Unstable:
#   PSP               → PPSSPP  (interpreter only; 1× native, no shaders)
#                        WARNING: Crashes with Vulkan/Metal driver on tvOS
#                        (GitHub #18050, June 2025). WORKAROUND: set
#                        video_driver = "gl" in a per-core override for
#                        PPSSPP. This conflicts with the global Metal
#                        driver — the override switches only for PSP.
#
# Tier 3 — Experimental (added to App Store builds in v1.22.x nightlies,
#                        2026; Azahar 2125.0 at RC1 as of March 2026):
#   Nintendo 3DS      → Azahar  (Citra fork; interpreter only, no JIT;
#                        lighter titles may be playable at <100% speed)
#
# Alternative cores (added 2025):
#   PC Engine          → Geargrafx  (alternative to Beetle PCE)
#   Genesis/Mega Drive → ClownMDEmu (alternative to Genesis Plus GX)
#
# NOT VIABLE on App Store build (JIT required):
#   Dreamcast, GameCube, Wii, PS2
#
# Source: Guide Section 2, Libretro iOS/tvOS docs


