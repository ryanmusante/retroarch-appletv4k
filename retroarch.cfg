# =============================================================================
# 14. POST-INSTALL CHECKLIST
# =============================================================================
# ☐  RetroArch installed from tvOS App Store
# ☐  Online Updater run: Assets, Core Info, Databases, Slang Shaders
#     (If shaders_slang/ is empty after update, upload manually via WebDAV)
# ☐  This config uploaded via web/WebDAV and loaded on relaunch (do NOT Save
#     Current Config before relaunching — it overwrites the uploaded file)
# ☐  Bluetooth controller paired (DualSense or Xbox Series recommended)
# ☐  Menu Toggle verified (L3 + R3 opens Quick Menu in-game)
# ☐  Additional hotkeys set via GUI (Settings → Input → Hotkeys)
# ☐  ROMs placed in Config/ROMs/<system>/ (NOT in Downloads/)
# ☐  BIOS files placed in Config/BIOS/ (case-sensitive filenames)
# ☐  Manual Scan completed per system (Import Content → Manual Scan)
# ☐  CRT shader applied per-core (Quick Menu → Shaders → Save Core Preset)
# ☐  iCloud Cloud Sync enabled (Settings → Saving → Cloud Sync)
# ☐  Apple TV output: 4K SDR 60 Hz (tvOS Settings → Video and Audio)
# ☐  TV Game Mode enabled (consult TV manual)
# ☐  aspect_ratio_index verified as "Core Provided" in RA GUI
# ☐  Quit and relaunch RetroArch to trigger initial iCloud sync
# ☐  Automatic Frame Delay enabled (Settings → Latency)
# ☐  Input Poll Type Behavior set to Late (Settings → Input)
# ☐  Max Swapchain Images set to 2 (Settings → Video → Sync) — verify on Metal
# ☐  Chroma 4:4:4 / RGB Full enabled on TV (TV HDMI input settings)
# ☐  Match Dynamic Range set to OFF (tvOS Settings → Video and Audio)
# ☐  Per-core overrides saved for N64 (disable auto frame delay, rewind)
# ☐  Per-core overrides saved for PSP (switch to OpenGL, disable latency features)


# =============================================================================
# 15. PER-CORE OVERRIDE REFERENCE
# =============================================================================
# Override files live in: Config/config/<core_name>/<core_name>.cfg
# Create via GUI: Quick Menu → Overrides → Save Core Overrides
#
# ┌──────────────────────┬──────────────────────────────────────────────┐
# │ Core                 │ Recommended Overrides                        │
# ├──────────────────────┼──────────────────────────────────────────────┤
# │ Mesen (NES)          │ rewind_enable = "true"                       │
# │                      │ run_ahead_frames = "1"                       │
# ├──────────────────────┼──────────────────────────────────────────────┤
# │ Snes9x (SNES)        │ rewind_enable = "true"                       │
# │                      │ run_ahead_frames = "1"                       │
# │                      │ (bump to 2 for SMW/Zelda if no artifacts)    │
# ├──────────────────────┼──────────────────────────────────────────────┤
# │ mGBA (GBA)           │ rewind_enable = "true"                       │
# │                      │ run_ahead_frames = "1"                       │
# │                      │ audio_latency = "32"  (test for crackling)   │
# ├──────────────────────┼──────────────────────────────────────────────┤
# │ Genesis Plus GX      │ rewind_enable = "true"                       │
# │                      │ run_ahead_frames = "1"                       │
# ├──────────────────────┼──────────────────────────────────────────────┤
# │ Beetle PCE           │ rewind_enable = "true"                       │
